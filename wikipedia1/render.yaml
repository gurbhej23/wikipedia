services:
  - type: web
    name: wikipedia-django
    env: python
    rootDir: wikipedia/wikipedia1
    buildCommand: ./build.sh
    startCommand: gunicorn wikipedia1.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.3
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: wikipedia-db
          property: connectionString

databases:
  - name: wikipedia-db
